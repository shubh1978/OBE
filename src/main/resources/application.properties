# ─── Database ────────────────────────────────────────────────────────────────
# Render injects DATABASE_URL as postgres://user:pass@host/db
# We set DB_URL manually in Render dashboard as jdbc:postgresql://... format
# Locally falls back to hardcoded defaults — nothing breaks
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/obe}
spring.datasource.username=${DB_USERNAME:shubhsinghal}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── Connection Pool ─────────────────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Server ──────────────────────────────────────────────────────────────────
# Render injects PORT automatically
server.port=${PORT:8080}

# ─── File Upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB